{% set name = "navcube" %}
{% set version = "1.1.0" %}
{% set git_url = "https://github.com/geompy/navcube.git" %}
{% set branch = "main" %}
{% set git_tag = "v" + version %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:

  # from published (conda-forge):
  # git_url: {{ git_url }}
  # git_tag: {{ git_tag }}

  # from local build
  path: ..

build:
  noarch: python
  script: "{{ PYTHON }} -m pip install . --no-deps -vv"

requirements:
  host:
    - python >=3.10,<3.13
    - pip
    - hatchling

  run:
    - python >=3.10,<3.13
    - pyside6
    - numpy

# Optional dependencies
extras:
  - name: occ
    requirements:
      - pythonocc-core
  - name: vtk
    requirements:
      - vtk

test:
  requires:
    - pip
    - pytest
  source_files:
    - tests
  imports:
    - navcube
  commands:
    - pip check
    - pytest tests -v --tb=short --disable-warnings

about:
  home: https://github.com/geompy/navcube
  summary: "A 3D orientation cube widget for PySide6 - renderer-agnostic, drop-in ready"
  description: |
    A 3D orientation cube widget for PySide6 that is renderer-agnostic
    and designed to be easily integrated into CAD and visualization workflows.
  license: MIT
  license_family: MIT
  doc_url: https://geompy.github.io/navcube/
  dev_url: https://github.com/geompy/navcube

extra:
  recipe-maintainers:
    - GEOMPY
